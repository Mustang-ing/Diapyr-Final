<!DOCTYPE html>
<html>
<head>
    <title>Sondage</title>
</head>
<body>
    <h2>Qui est disponible ?</h2>

    <form method="post">
        {% csrf_token %}

        {% for user in users %}
            <label>
                <input type="checkbox" name="votes" value="{{ user.id }}">
                {{ user.username }}
            </label><br>
        {% endfor %}

        <button type="submit">Envoyer</button>
    </form>
</body>
</html>
